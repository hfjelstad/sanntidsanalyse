<svg width="100%" viewBox="0 0 900 340" xmlns="http://www.w3.org/2000/svg" style="background:#1a1a2e">
  <title>Virkelighet vs. Systemet tror</title>

  <defs>
    <linearGradient id="realGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a5f"/>
      <stop offset="100%" style="stop-color:#1a1a2e"/>
    </linearGradient>
    <linearGradient id="sysGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3d1f1f"/>
      <stop offset="100%" style="stop-color:#1a1a2e"/>
    </linearGradient>
  </defs>

  <!-- Left: VIRKELIGHET -->
  <rect x="20" y="20" width="410" height="300" rx="14" fill="url(#realGrad)" stroke="#38bdf8" stroke-width="1.5"/>
  <text x="225" y="52" text-anchor="middle" font-family="system-ui, sans-serif" font-size="15" font-weight="700" fill="#7dd3fc">✅ VIRKELIGHET</text>

  <!-- Train icon + path -->
  <text x="225" y="100" text-anchor="middle" font-family="system-ui, sans-serif" font-size="36">🚆</text>
  <text x="225" y="130" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#e0f2fe">Kjøretøy Z</text>
  <text x="225" y="150" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#93c5fd">pendler kontinuerlig Oslo ↔ Lillehammer</text>

  <!-- Continuous sine wave -->
  <path d="M 60,195 C 90,145 130,145 160,195 C 190,245 230,245 260,195 C 290,145 330,145 360,195 C 390,245 400,245 410,220" 
        stroke="#38bdf8" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.9"/>
  
  <!-- Labels on left side -->
  <text x="55" y="185" text-anchor="end" font-family="system-ui, sans-serif" font-size="9" fill="#7dd3fc">Lillehammer</text>
  <text x="55" y="215" text-anchor="end" font-family="system-ui, sans-serif" font-size="9" fill="#7dd3fc">Oslo S</text>
  <line x1="58" y1="180" x2="415" y2="180" stroke="#38bdf8" stroke-width="0.3" opacity="0.4"/>
  <line x1="58" y1="210" x2="415" y2="210" stroke="#38bdf8" stroke-width="0.3" opacity="0.4"/>

  <!-- Attributes -->
  <rect x="60" y="240" width="155" height="28" rx="6" fill="#1e3a5f" stroke="#38bdf8" stroke-width="0.8"/>
  <text x="137" y="258" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#7dd3fc">🆔 Identitet: ALLTID KJENT</text>

  <rect x="230" y="240" width="175" height="28" rx="6" fill="#1e3a5f" stroke="#38bdf8" stroke-width="0.8"/>
  <text x="317" y="258" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#7dd3fc">📍 Posisjon: KONTINUERLIG</text>

  <rect x="120" y="278" width="200" height="28" rx="6" fill="#1e3a5f" stroke="#38bdf8" stroke-width="0.8"/>
  <text x="220" y="296" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#7dd3fc">📉 Forsinkelse: ARVES NATURLIG</text>

  <!-- Right: SYSTEMET TROR -->
  <rect x="470" y="20" width="410" height="300" rx="14" fill="url(#sysGrad)" stroke="#f87171" stroke-width="1.5"/>
  <text x="675" y="52" text-anchor="middle" font-family="system-ui, sans-serif" font-size="15" font-weight="700" fill="#fca5a5">❌ SYSTEMET TROR</text>

  <!-- Two separate tickets -->
  <text x="575" y="100" text-anchor="middle" font-family="system-ui, sans-serif" font-size="28">🎫</text>
  <text x="775" y="100" text-anchor="middle" font-family="system-ui, sans-serif" font-size="28">🎫</text>
  <text x="575" y="125" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#fecaca">«Tog 61»</text>
  <text x="575" y="140" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#fca5a5">(nordgående)</text>
  <text x="775" y="125" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#fecaca">«Tog 64»</text>
  <text x="775" y="140" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#fca5a5">(sørgående)</text>

  <!-- Broken segments -->
  <line x1="510" y1="180" x2="640" y2="180" stroke="#f87171" stroke-width="0.3" opacity="0.4"/>
  <line x1="510" y1="210" x2="640" y2="210" stroke="#f87171" stroke-width="0.3" opacity="0.4"/>
  <line x1="710" y1="180" x2="845" y2="180" stroke="#f87171" stroke-width="0.3" opacity="0.4"/>
  <line x1="710" y1="210" x2="845" y2="210" stroke="#f87171" stroke-width="0.3" opacity="0.4"/>
  
  <!-- First segment (solid) -->
  <path d="M 520,210 C 545,170 575,170 600,180 C 620,188 635,195 640,195" 
        stroke="#f87171" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  
  <!-- GAP with question marks -->
  <rect x="648" y="172" width="55" height="32" rx="6" fill="#4a1a1a" stroke="#f87171" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="675" y="193" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#f87171">???</text>

  <!-- Second segment (solid) -->
  <path d="M 710,195 C 720,195 740,202 760,210 C 785,180 815,180 840,210" 
        stroke="#f87171" stroke-width="2.5" fill="none" stroke-linecap="round"/>

  <!-- Attributes -->
  <rect x="505" y="240" width="165" height="28" rx="6" fill="#3d1f1f" stroke="#f87171" stroke-width="0.8"/>
  <text x="587" y="258" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#fca5a5">🆔 Identitet: FORSVINNER</text>

  <rect x="685" y="240" width="175" height="28" rx="6" fill="#3d1f1f" stroke="#f87171" stroke-width="0.8"/>
  <text x="772" y="258" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#fca5a5">📍 Posisjon: HULL VED VENDING</text>

  <rect x="570" y="278" width="210" height="28" rx="6" fill="#3d1f1f" stroke="#f87171" stroke-width="0.8"/>
  <text x="675" y="296" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#fca5a5">📉 Forsinkelse: USYNLIG I GAPET</text>

  <!-- VS divider -->
  <circle cx="450" cy="170" r="22" fill="#1a1a2e" stroke="#666" stroke-width="1.5"/>
  <text x="450" y="176" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#aaa">VS</text>
</svg>